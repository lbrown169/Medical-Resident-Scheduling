name: Run Constraint Tests

on:
    push:
        paths:
            - "backend/**"
            - "MedicalTests/**"
    pull_request:
        paths:
            - "backend/**"
            - "MedicalTests/**"

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET 10
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore --configuration Release

            - name: Run constraint tests
              run: dotnet test MedicalTests/MedicalTests.csproj --no-build --configuration Release --verbosity normal
