name: Check .editorconfig Compliance

on:
    push:
        paths:
            - "backend/**"
            - "MedicalTests/**"
    pull_request:
        paths:
            - "backend/**"
            - "MedicalTests/**"

jobs:
    editorconfig-check:
        name: Verify .editorconfig Formatting
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x" # adjust to your project’s version

            - name: Restore dependencies
              run: dotnet restore

            - name: Verify Backend formatting
              run: |
                  dotnet format backend/MedicalDemo.sln --verify-no-changes --severity error

            - name: Verify Medidcal Tests formatting
              run: |
                  dotnet format MedicalTests/MedicalDemo.sln --verify-no-changes --severity error
